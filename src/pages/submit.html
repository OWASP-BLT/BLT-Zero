<script>
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("reportForm");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  const input = document.getElementById("shots");
  const preview = document.getElementById("preview");
  const sizeText = document.getElementById("sizeText");

  const MAX_TOTAL_BYTES = {{maxTotalBytes}};
  const MAX_FILES_ALLOWED = {{maxFiles}};

  let files = [];

  function updatePreview() {
    preview.innerHTML = "";
    let total = 0;

    files.forEach((f, i) => {
      total += f.size;

      const div = document.createElement("div");

      const p = document.createElement("p");
      p.textContent = `${f.name} (${(f.size / 1024 / 1024).toFixed(2)} MB)`;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = "Remove";
      btn.dataset.i = i;

      div.appendChild(p);
      div.appendChild(btn);
      preview.appendChild(div);
    });

    sizeText.textContent = `Total: ${(total / 1024 / 1024).toFixed(2)} MB`;
  }

  preview.addEventListener("click", (e) => {
    const index = e.target.dataset.i;
    if (index !== undefined) {
      files.splice(Number(index), 1);
      updatePreview();
    }
  });

  input.addEventListener("change", e => {
    const newFiles = Array.from(e.target.files);

    newFiles.forEach(f => {
      if (!f.type.startsWith("image/")) return;

      if (files.length >= MAX_FILES_ALLOWED) {
        alert(`Maximum ${MAX_FILES_ALLOWED} screenshots allowed`);
        return;
      }

      const total = files.reduce((s, file) => s + file.size, 0);

      if (total + f.size > MAX_TOTAL_BYTES) {
        alert("Total screenshot size limit exceeded");
        return;
      }

      files.push(f);
    });

    updatePreview();
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      btn.disabled = true;
      msg.textContent = "Submitting...";

      const org_email = document.getElementById("org_email").value.trim();
      const url = document.getElementById("url").value.trim();
      const description = document.getElementById("description").value.trim();
      const markdown = document.getElementById("markdown").value.trim();

      let domain;
      try {
        domain = new URL(url).hostname;
      } catch {
        throw new Error("Invalid URL");
      }

      if (files.length > MAX_FILES_ALLOWED) {
        throw new Error(`Maximum ${MAX_FILES_ALLOWED} screenshots allowed`);
      }

      const totalSize = files.reduce((s,f)=>s+f.size,0);
      if (totalSize > MAX_TOTAL_BYTES) {
        throw new Error("Total screenshot size exceeded");
      }

      const payload = {
        domain,
        encrypted_package: {
          domain,
          ciphertext_b64: btoa(JSON.stringify({
            org_email,
            url,
            description,
            markdown
          })),
          iv_b64: "dummy_iv",
          salt_b64: "dummy_salt",
          eph_pub_jwk: { kty: "EC" }
        },
        // informational only (not enforced server-side)
        screenshot_count: files.length,
        screenshot_total_size: files.reduce((s,f)=>s+f.size,0)
      };

      const res = await fetch("/submit", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Submission failed");

      msg.textContent = "Success\n" + JSON.stringify(data, null, 2);

      form.reset();
      files = [];
      updatePreview();

    } catch (err) {
      msg.textContent = "❌ " + err.message;
    } finally {
      btn.disabled = false;
    }
  });

});
</script>
