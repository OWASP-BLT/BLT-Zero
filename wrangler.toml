name = "blt-zero"
main = "src/main.py"
compatibility_date = "2026-02-28"
compatibility_flags = ["python_workers"]

# HTML file handling
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# Static assets
[assets]
directory = "./static"

# Environment variables
[vars]
APP_ORIGIN = "https://zero.owaspblt.org"
MAX_UPLOAD_BYTES = "3145728"  # 3 MiB cap

EMAIL_PROVIDER = "mailchannels"  # or "sendgrid"
DISABLE_TURNSTILE = "true"
TURNSTILE_SITE_KEY = "REPLACE_ME"

# Set ORG_EMAIL as a secret (wrangler secret put ORG_EMAIL) or here for dev
# ORG_EMAIL = "security@your-org.com"
